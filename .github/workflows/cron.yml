name: Crawl XSMN

on:
  schedule:
    - cron: '0 11 * * *'  # 1VN
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install puppeteer

      - run: node crawl/crawlXSMN.js
