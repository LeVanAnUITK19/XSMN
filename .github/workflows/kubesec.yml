name: Crawl_PUT

on:
  schedule:
   # 16:30 VN (9:30 UTC) - Đang quay những giải cuối
    - cron: '0 9 * * *'
    
    # 16:45 VN (9:45 UTC) - Thường đã có đầy đủ kết quả
    - cron: '15 9 * * *'
    
    # 17:00 VN (10:00 UTC) - Chốt hạ bản lưu trữ cuối cùng
    
    - cron: '30 9 * * *'
    - cron: '45 9 * * *'
    - cron: '0 10 * * *'
  workflow_dispatch: 

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
        working-directory: crawl        # <-- thêm dòng này
      - run: node crawlXSMN_PUT.js      # <-- bỏ "crawl/" vì đã cd vào rồi
        working-directory: crawl
